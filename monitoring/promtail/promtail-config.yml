server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    pipeline_stages:
    - docker: {}
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_job_name']
        target_label: 'job'
      - source_labels: ['__meta_docker_container_label_env']
        target_label: 'environment'
      - source_labels: ['__meta_docker_container_id']
        target_label: 'instance'

  - job_name: syslog
    syslog:
      listen_address: 0.0.0.0:514
      listen_protocol: udp
    relabel_configs:
      # Use a relabel_config with a 'replace' action to add the static label 'job'
      - source_labels: [__address__]
        regex: '(.*)'
        target_label: 'job'
        replacement: 'syslog'
      
      # Now, add the dynamic labels
      - source_labels: ['__syslog_message_hostname']
        target_label: 'instance'
      - source_labels: ['__syslog_message_app_name']
        target_label: 'syslog_app'
